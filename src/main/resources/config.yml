# FGVaultLog 只觀測並記錄 Vault Economy 玩家金流，不會主動改變任何玩家餘額。
# 紀錄位於 plugins/FGVaultLog/transactions.db。

proxy:
  # 啟用後會以高優先權註冊一個透明 Economy 代理，再轉呼叫原本的 provider。
  enabled: true
  # HIGHEST 可讓多數使用 Vault API 的插件取得代理；若伺服器有其他高優先權 provider，請看 /vaultlog status。
  priority: HIGHEST
  # 找不到 Economy provider 時的重試間隔，單位為 ticks；20 ticks 約等於 1 秒。
  hook-interval-ticks: 100

logging:
  # 是否記錄 Vault 回傳失敗的交易；建議保留，方便追查餘額不足或 provider 錯誤。
  include-failed: true

query:
  # 每頁最多顯示的筆數，避免管理員查詢時一次塞滿聊天視窗。
  page-size: 8

cmi:
  # CMI 存在時，額外記錄 CMI 原生餘額事件，例如 /money give。
  # 關閉後仍會保留 Vault Economy 代理紀錄。
  enabled: true

fallback:
  # 兜底偵測沒有經過 Vault、也沒有原生 event 的直接餘額變更。
  # 只能知道餘額差額，無法從事後快照推導真實原因，紀錄會標示 UNKNOWN_EXTERNAL_CHANGE。
  enabled: true
  poll-interval-ticks: 100
